<script src="edge-impulse-standalone.js"></script>
<script src="run-impulse.js"></script> <script>
    async function initAI() {
        const video = document.getElementById('webcam');
        const status = document.getElementById('status-text');

        try {
            // 1. Initialize the bridge class found in run-impulse.js
            const classifier = new EdgeImpulseClassifier();
            
            // This waits for the .wasm file to load into the browser
            await classifier.init(); 
            
            status.innerText = "Status: AI Loaded! Starting Camera...";

            // 2. Request Camera
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            video.srcObject = stream;

            // 3. Start Inference Loop once video plays
            video.onloadedmetadata = () => {
                video.play();
                status.innerText = "Status: Scanning...";
                
                setInterval(async () => {
                    // Capture a frame and send to AI
                    const results = await classifier.classify(video);
                    
                    // Edge Impulse WASM results are usually in 'results.results'
                    if (results.results) {
                        processResults(results.results);
                    }
                }, 600); // 600ms is a good balance for iPhone
            };
        } catch (e) {
            status.innerText = "Error: " + e.message;
            console.error(e);
        }
    }

    function processResults(classifications) {
        const threshold = 0.85;
        // The labels from your 4 items
        const labels = ["Deodorant", "Grips", "Hot sauce", "Power bank"];

        classifications.forEach(res => {
            if (labels.includes(res.label) && res.value > threshold && canScan) {
                sendToCart(res.label);
            }
        });
    }
</script>
