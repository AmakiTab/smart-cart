<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Cart AI - Diagnostic Mode</title>
   <script src="edge-impulse-standalone.js"></script>
<script src="run-impulse.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; padding: 15px; }
        .container { max-width: 400px; margin: auto; background: #2d2d2d; padding: 20px; border-radius: 20px; }
        #video-wrap { position: relative; border: 2px solid #444; border-radius: 12px; overflow: hidden; height: 250px; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* DIAGNOSTIC HEARTBEAT */
        #heartbeat { position: absolute; top: 10px; right: 10px; width: 15px; height: 15px; background: grey; border-radius: 50%; border: 2px solid white; }
        .active-pulse { background: #00ff00 !important; box-shadow: 0 0 10px #00ff00; }

        .inference-display { font-size: 24px; color: #007bff; margin: 15px 0; font-weight: bold; }
        .conf-list { text-align: left; background: #3d3d3d; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 13px; }
        .bar-bg { background: #555; height: 10px; border-radius: 5px; margin: 5px 0 10px 0; }
        .bar-fill { background: #007bff; height: 100%; width: 0%; transition: width 0.1s; }
        button { width: 100%; padding: 15px; margin: 5px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        #startBtn { background: #007bff; color: white; }
        #addBtn { background: #28a745; color: white; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>AI DIAGNOSTIC</h2>
    <input type="text" id="espIp" placeholder="ESP32 IP" style="width:90%; padding:10px; margin-bottom:10px; border-radius:5px;">
    <button id="startBtn">START AI ENGINE</button>

    <div id="video-wrap">
        <video id="webcam" autoplay muted playsinline></video>
        <div id="heartbeat" title="AI Status (Green = Working)"></div>
    </div>

    <div id="top-result" class="inference-display">ENGINE OFF</div>
    
    <button id="addBtn">ADD ITEM</button>

    <div id="conf-list" class="conf-list">
        AI Results will appear here...
    </div>
</div>

<canvas id="hiddenCanvas" width="160" height="160" style="display:none;"></canvas>

<script>
    let classifier;
    const targets = ["Clay stick", "Sun stick", "Lighter", "Grips"];
    const heartbeat = document.getElementById('heartbeat');
    const topResult = document.getElementById('top-result');
    const video = document.getElementById('webcam');

    document.getElementById('startBtn').onclick = async function() {
        this.innerText = "LOADING WASM...";
        try {
            classifier = new EdgeImpulseClassifier();
            await classifier.init();
            
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            video.srcObject = stream;
            
            video.onloadeddata = () => {
                this.style.display = 'none';
                topResult.innerText = "SCANNING...";
                loop();
            };
        } catch (e) {
            topResult.innerText = "INIT FAILED";
            alert("Model Error: " + e.message);
        }
    };

    async function loop() {
        // Heartbeat Blink (Visual proof that code is running)
        heartbeat.classList.toggle('active-pulse');

        try {
            const canvas = document.getElementById('hiddenCanvas');
            const ctx = canvas.getContext('2d');
            
            // 1. Capture frame
            ctx.drawImage(video, 0, 0, 160, 160);
            
            // 2. Get Raw Pixels
            const imgData = ctx.getImageData(0, 0, 160, 160).data;
            const pixels = [];
            for (let i = 0; i < imgData.length; i += 4) {
                pixels.push(imgData[i] / 255);
                pixels.push(imgData[i+1] / 255);
                pixels.push(imgData[i+2] / 255);
            }

            // 3. Inference
            const result = await classifier.classify(pixels);
            
            if (result.results) {
                updateUI(result.results);
            }
        } catch (err) {
            console.error("AI Loop Error:", err);
            topResult.innerText = "LOOP CRASHED";
        }

        // Run again in 300ms
        setTimeout(loop, 300);
    }

    function updateUI(results) {
        let html = "";
        const sorted = results.sort((a,b) => b.value - a.value);
        
        // Show Top Result
        const best = sorted[0];
        topResult.innerText = `${best.label}: ${(best.value * 100).toFixed(0)}%`;

        if (targets.includes(best.label) && best.value > 0.4) {
            document.getElementById('addBtn').style.display = 'block';
        } else {
            document.getElementById('addBtn').style.display = 'none';
        }

        results.forEach(r => {
            const p = (r.value * 100).toFixed(0);
            html += `<div>${r.label} (${p}%)</div>
                     <div class="bar-bg"><div class="bar-fill" style="width:${p}%"></div></div>`;
        });
        document.getElementById('conf-list').innerHTML = html;
    }
</script>
</body>
</html>
