<body>
    <h2>Smart Cart AI</h2>
    <div class="status">
        <input type="text" id="espIp" placeholder="Enter ESP32 IP">
        <button id="startBtn" style="padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px;">
            Start Camera
        </button>
        <div id="status-text">Status: Click Start Camera</div>
        <div id="log">Last Scanned: None</div>
    </div>

    <div id="video-container">
        <video id="webcam" autoplay muted playsinline></video>
    </div>

    <script>
        // ... (Keep your existing variables) ...

        document.getElementById('startBtn').addEventListener('click', async () => {
            try {
                document.getElementById('status-text').innerText = "Status: Initializing AI...";
                await initAI();
                document.getElementById('status-text').innerText = "Status: Camera Active";
                document.getElementById('startBtn').style.display = 'none'; // Hide button after start
            } catch (err) {
                document.getElementById('status-text').innerText = "Error: " + err.message;
            }
        });

        async function initAI() {
            const video = document.getElementById('webcam');
            // 'facingMode: environment' uses the back camera
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" }, 
                audio: false 
            });
            video.srcObject = stream;
            
            // Wait for video to be ready before starting AI
            return new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    video.play();
                    // Start your classification loop here
                    startInferenceLoop(video);
                    resolve();
                };
            });
        }
        
        // ... (Keep your startInferenceLoop and processResults functions) ...
    </script>
</body>
