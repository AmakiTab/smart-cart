<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Cart AI - Pro Smooth</title>
    <script src="edge-impulse-standalone.js"></script>
    <script src="run-impulse.js"></script>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; margin: 0; padding: 15px; overflow-x: hidden; }
        .container { max-width: 420px; margin: auto; background: white; padding: 20px; border-radius: 24px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; font-size: 20px; color: #333; }
        
        #video-container { position: relative; width: 100%; border-radius: 16px; overflow: hidden; background: #000; line-height: 0; border: 3px solid var(--primary); }
        video { width: 100%; height: auto; }
        
        /* The Square Box overlaying the video */
        #ai-guide { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 160px; height: 160px; border: 2px solid red; box-shadow: 0 0 0 1000px rgba(0,0,0,0.4); pointer-events: none; }
        
        .inference-display { font-size: 24px; font-weight: 800; color: var(--primary); margin: 15px 0; min-height: 30px; }
        input { width: 100%; box-sizing: border-box; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; }
        
        button { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 8px; }
        #startBtn { background: var(--primary); color: white; }
        .btn-add { background: var(--success); color: white; display: none; }
        .btn-remove { background: var(--danger); color: white; }
        
        #log { font-weight: 600; color: var(--success); height: 20px; margin-top: 10px; font-size: 14px; }
        .conf-item { text-align: left; font-size: 12px; margin-bottom: 4px; }
        .bar-bg { background: #eee; height: 6px; border-radius: 3px; overflow: hidden; margin-top: 2px; }
        .bar-fill { background: var(--primary); height: 100%; transition: width 0.1s linear; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛒 Smart Cart AI</h2>
    <input type="text" id="espIp" placeholder="ESP32 IP (e.g. 192.168.1.50)">
    <button id="startBtn">Launch Smooth Scanner</button>

    <div id="video-container" style="display:none;">
        <video id="webcam" autoplay muted playsinline></video>
        <div id="ai-guide"></div>
    </div>

    <div id="top-result" class="inference-display">READY</div>

    <div style="margin-top: 10px;">
        <button id="addBtn" class="btn-add">➕ Add Item</button>
        <button id="removeBtn" class="btn-remove">🔄 Remove Item</button>
    </div>

    <div id="conf-list" style="margin-top: 15px; background: #f8f9fa; padding: 12px; border-radius: 12px;"></div>
    <div id="log">Status: Idle</div>
</div>

<canvas id="offscreenCanvas" width="160" height="160" style="display:none;"></canvas>

<script>
    let currentDetectedItem = null;
    let lastAddedItem = null;
    const targets = ["Clay stick", "Sun stick", "Lighter", "Grips"];

    const video = document.getElementById('webcam');
    const startBtn = document.getElementById('startBtn');
    const topDisplay = document.getElementById('top-result');
    const logDisplay = document.getElementById('log');
    const canvas = document.getElementById('offscreenCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });

    startBtn.onclick = async () => {
        startBtn.style.display = 'none';
        document.getElementById('video-container').style.display = 'block';
        initAI();
    };

    async function initAI() {
        try {
            const classifier = new EdgeImpulseClassifier();
            await classifier.init();
            
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: 640, height: 480 } 
            });
            video.srcObject = stream;

            video.onloadedmetadata = () => {
                video.play();
                runInference(classifier);
            };
        } catch (e) {
            topDisplay.innerText = "ERROR";
            alert("Camera failed: " + e.message);
        }
    }

    async function runInference(classifier) {
        const props = classifier.getProperties();
        
        const processFrame = async () => {
            if (video.readyState === 4) {
                // 1. Precise Center Crop for "Fit to Shortest Axis"
                const size = Math.min(video.videoWidth, video.videoHeight);
                const sx = (video.videoWidth - size) / 2;
                const sy = (video.videoHeight - size) / 2;
                
                ctx.drawImage(video, sx, sy, size, size, 0, 0, 160, 160);
                
                // 2. Fast Pixel Extraction
                const imgData = ctx.getImageData(0, 0, 160, 160).data;
                const pixels = new Float32Array(160 * 160 * 3);
                for (let i = 0; i < 160 * 160; i++) {
                    pixels[i * 3] = imgData[i * 4] / 255.0;
                    pixels[i * 3 + 1] = imgData[i * 4 + 1] / 255.0;
                    pixels[i * 3 + 2] = imgData[i * 4 + 2] / 255.0;
                }

                // 3. Classify (This is the heavy part)
                const result = await classifier.classify(Array.from(pixels));
                
                if (result.results) {
                    updateUI(result.results);
                }
            }
            // A tiny gap (50ms) keeps the UI "buttery smooth"
            setTimeout(processFrame, 50);
        };
        
        processFrame();
    }

    function updateUI(results) {
        const sorted = results.sort((a, b) => b.value - a.value);
        const best = sorted.find(r => targets.includes(r.label));

        if (best && best.value > 0.40) {
            topDisplay.innerText = `${best.label} ${(best.value * 100).toFixed(0)}%`;
            currentDetectedItem = best.label;
            document.getElementById('addBtn').style.display = 'block';
            document.getElementById('addBtn').innerText = `➕ Add ${best.label}`;
        } else {
            topDisplay.innerText = "Scanning...";
            currentDetectedItem = null;
            document.getElementById('addBtn').style.display = 'none';
        }

        let html = "";
        sorted.forEach(r => {
            const p = (r.value * 100).toFixed(0);
            const isT = targets.includes(r.label);
            html += `<div class="conf-item">${r.label}: ${p}%
                    <div class="bar-bg"><div class="bar-fill" style="width:${p}%; background:${isT?'':'#bbb'}"></div></div></div>`;
        });
        document.getElementById('conf-list').innerHTML = html;
    }

    // ACTIONS
    document.getElementById('addBtn').onclick = () => sendToESP('add', currentDetectedItem);
    document.getElementById('removeBtn').onclick = () => {
        const item = currentDetectedItem || lastAddedItem;
        if (item) sendToESP('remove', item);
    };

    function sendToESP(action, label) {
        const ip = document.getElementById('espIp').value;
        if (!ip) return;
        const img = new Image();
        img.src = `http://${ip}/${action}?label=${encodeURIComponent(label)}&t=${Date.now()}`;
        logDisplay.innerText = `Sent: ${action} ${label}`;
        if (action === 'add') lastAddedItem = label;
    }
</script>
</body>
</html>
