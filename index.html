<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Cart AI Scanner</title>
    <script src="edge-impulse-standalone.js"></script>
    <script src="run-impulse.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        video { width: 100%; border-radius: 15px; margin: 15px 0; display: none; border: 3px solid #007bff; }
        .inference-display { font-size: 24px; font-weight: bold; color: #007bff; margin: 15px 0; }
        .confidence-list { text-align: left; font-family: monospace; background: #e9ecef; padding: 10px; border-radius: 10px; font-size: 14px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; }
        button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; }
        #log { color: #28a745; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛒 Smart Cart AI</h2>
    <input type="text" id="espIp" placeholder="Enter ESP32 IP (e.g. 192.168.1.50)">
    <button id="startBtn">Start Inferencing...</button>
    
    <video id="webcam" autoplay muted playsinline></video>

    <div id="top-result" class="inference-display">Waiting...</div>
    <div id="conf-list" class="confidence-list"></div>
    <div id="log">Last Scanned: None</div>
</div>

<script>
    let canScan = true;
    let classifier;
    const targets = ["Deodorant", "Grips", "Hot sauce", "Power bank"];

    document.getElementById('startBtn').onclick = async () => {
        document.getElementById('startBtn').style.display = 'none';
        await initAI();
    };

    async function initAI() {
        try {
            classifier = new EdgeImpulseClassifier();
            await classifier.init();
            
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            const video = document.getElementById('webcam');
            video.srcObject = stream;
            video.style.display = 'block';

            video.onloadedmetadata = () => {
                video.play();
                setInterval(async () => {
                    const results = await classifier.classify(video);
                    if (results.results) {
                        updateUI(results.results);
                        checkAndScan(results.results);
                    }
                }, 600);
            };
        } catch (e) {
            document.getElementById('top-result').innerText = "Error: " + e.message;
        }
    }

    function updateUI(classifications) {
        // Find top result for the big text
        const top = classifications.sort((a, b) => b.value - a.value)[0];
        document.getElementById('top-result').innerText = `${top.label} (${top.value.toFixed(2)})`;

        // Create the list view like your screenshot
        let listHtml = "";
        classifications.forEach(res => {
            const isTarget = targets.includes(res.label) ? "★ " : "  ";
            listHtml += `<div>${isTarget}${res.label.padEnd(12)}: ${res.value.toFixed(2)}</div>`;
        });
        document.getElementById('conf-list').innerHTML = listHtml;
    }

    function checkAndScan(classifications) {
        if (!canScan) return;

        // Skip Background: Find the highest scoring item that is in our target list
        const bestItem = classifications
            .filter(res => targets.includes(res.label))
            .sort((a, b) => b.value - a.value)[0];

        // Trigger if item exists and is over 0.70 confidence
        if (bestItem && bestItem.value > 0.70) {
            sendToCart(bestItem.label);
        }
    }

    function sendToCart(itemName) {
        const ip = document.getElementById('espIp').value;
        if (!ip) return;

        canScan = false;
        document.getElementById('log').innerText = "✅ SCANNED: " + itemName;
        
        fetch(`http://${ip}/add?label=${encodeURIComponent(itemName)}`, { mode: 'no-cors' })
            .finally(() => {
                setTimeout(() => { 
                    canScan = true; 
                    document.getElementById('log').innerText = "Ready for next item...";
                }, 3000);
            });
    }
</script>
</body>
</html>
