<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Cart AI Scanner</title>
    <script src="edge-impulse-standalone.js"></script>
    <script src="run-impulse.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        video { width: 100%; border-radius: 15px; margin: 15px 0; display: none; border: 3px solid #007bff; transform: scaleX(1); }
        .inference-display { font-size: 24px; font-weight: bold; color: #007bff; margin: 15px 0; min-height: 32px; }
        .confidence-list { text-align: left; font-family: monospace; background: #e9ecef; padding: 15px; border-radius: 10px; font-size: 14px; line-height: 1.6; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        button:active { background: #0056b3; }
        #log { color: #28a745; font-weight: bold; margin-top: 10px; height: 20px; }
        .bar-container { background: #ddd; height: 8px; border-radius: 4px; margin-top: 4px; margin-bottom: 8px; overflow: hidden; }
        .bar-fill { background: #007bff; height: 100%; transition: width 0.2s; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛒 Smart Cart AI</h2>
    <input type="text" id="espIp" placeholder="Enter ESP32 IP (e.g. 192.168.1.50)">
    <button id="startBtn">Start Inferencing...</button>
    
    <video id="webcam" autoplay muted playsinline></video>

    <div id="top-result" class="inference-display">Ready...</div>
    <div id="conf-list" class="confidence-list"></div>
    <div id="log">Last Scanned: None</div>
</div>

<script>
    let canScan = true;
    let classifier;
    const targets = ["Deodorant", "Grips", "Hot sauce", "Power bank"];

    document.getElementById('startBtn').onclick = async () => {
        document.getElementById('startBtn').style.display = 'none';
        await initAI();
    };

    async function initAI() {
        const statusDisplay = document.getElementById('top-result');
        try {
            statusDisplay.innerText = "Loading AI...";
            
            classifier = new EdgeImpulseClassifier();
            await classifier.init();
            
            const props = classifier.getProperties();
            console.log("Model initialized:", props.input_width, "x", props.input_height);

            const video = document.getElementById('webcam');
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: "environment",
                    width: { ideal: 640 }, 
                    height: { ideal: 480 }
                } 
            });
            
            video.srcObject = stream;
            video.style.display = 'block';

            video.onloadedmetadata = () => {
                video.play();
                statusDisplay.innerText = "Searching...";
                
                setInterval(async () => {
                    if (!canScan) return;

                    // Center Crop logic to maintain aspect ratio
                    const imgData = getPixelData(video, props.input_width, props.input_height);
                    
                    const result = await classifier.classify(imgData);
                    
                    if (result.results) {
                        updateUI(result.results);
                        checkAndScan(result.results);
                    }
                }, 600);
            };
        } catch (e) {
            console.error(e);
            statusDisplay.innerText = "AI Error: " + e.message;
        }
    }

    // Capture, Center-Crop, and Resize for 160x160 RGB
    function getPixelData(video, targetW, targetH) {
        const canvas = document.createElement('canvas');
        canvas.width = targetW;
        canvas.height = targetH;
        const ctx = canvas.getContext('2d');

        const videoW = video.videoWidth;
        const videoH = video.videoHeight;
        const size = Math.min(videoW, videoH);
        const xOffset = (videoW - size) / 2;
        const yOffset = (videoH - size) / 2;

        // Crop square from center, then draw to 160x160 canvas
        ctx.drawImage(video, xOffset, yOffset, size, size, 0, 0, targetW, targetH);
        
        const img = ctx.getImageData(0, 0, targetW, targetH).data;
        const pixels = [];
        for (let i = 0; i < img.length; i += 4) {
            // Push R, G, B values
            pixels.push(img[i], img[i+1], img[i+2]);
        }
        return pixels;
    }

    function updateUI(classifications) {
        // Filter for target items to show in main header
        const sortedTargets = classifications
            .filter(res => targets.includes(res.label))
            .sort((a, b) => b.value - a.value);
            
        const topOverall = [...classifications].sort((a, b) => b.value - a.value)[0];
        
        // Show target in main display if it's reasonably confident
        if (sortedTargets.length > 0 && sortedTargets[0].value > 0.3) {
             document.getElementById('top-result').innerText = `${sortedTargets[0].label} (${(sortedTargets[0].value * 100).toFixed(0)}%)`;
        } else {
             document.getElementById('top-result').innerText = `Searching...`;
        }

        // Render full list with bars
        let listHtml = "";
        const listSorted = [...classifications].sort((a, b) => b.value - a.value);
        
        listSorted.forEach(res => {
            const percent = (res.value * 100).toFixed(0);
            const isTarget = targets.includes(res.label);
            const barColor = isTarget ? "#007bff" : "#6c757d";

            listHtml += `
                <div>
                    <span>${res.label}: ${percent}%</span>
                    <div class="bar-container">
                        <div class="bar-fill" style="width: ${percent}%; background: ${barColor};"></div>
                    </div>
                </div>`;
        });
        document.getElementById('conf-list').innerHTML = listHtml;
    }

    function checkAndScan(classifications) {
        if (!canScan) return;

        const bestItem = classifications
            .filter(res => targets.includes(res.label))
            .sort((a, b) => b.value - a.value)[0];

        // Trigger if confidence is over 80%
        if (bestItem && bestItem.value > 0.80) {
            sendToCart(bestItem.label);
        }
    }

    function sendToCart(itemName) {
        const ip = document.getElementById('espIp').value;
        if (!ip) return;

        canScan = false;
        document.getElementById('log').innerText = "✅ SCANNED: " + itemName;
        
        // Use an Image ping to bypass strict CORS/Handshake issues on mobile Safari
        const img = new Image();
        img.src = `http://${ip}/add?label=${encodeURIComponent(itemName)}&t=${Date.now()}`;
        
        // Reset scanner after 3 seconds
        setTimeout(() => {
            canScan = true; 
            document.getElementById('log').innerText = "Ready for next item...";
        }, 3000);
    }
</script>
</body>
</html>
