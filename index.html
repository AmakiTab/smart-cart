<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Cart AI - Pro Scanner</title>
    <script src="edge-impulse-standalone.js"></script>
    <script src="run-impulse.js"></script>
    <style>
        :root { --accent: #007bff; --bg: #121212; --card: #1e1e1e; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; background: var(--card); padding: 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); box-sizing: border-box; }
        
        /* Camera Styling */
        #video-wrap { position: relative; width: 100%; border-radius: 16px; overflow: hidden; background: #000; aspect-ratio: 4/3; border: 2px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* The Center AI Target Box */
        #ai-guide { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 160px; height: 160px; border: 2px solid rgba(255,0,0,0.5); pointer-events: none; }
        #heartbeat { position: absolute; top: 10px; right: 10px; width: 12px; height: 12px; background: #444; border-radius: 50%; border: 2px solid #fff; }
        .pulse-on { background: #00ff00 !important; box-shadow: 0 0 10px #00ff00; }

        .inference-display { font-size: 26px; font-weight: 800; color: var(--accent); margin: 20px 0; text-transform: uppercase; }
        
        /* Controls */
        input { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #444; background: #2a2a2a; color: white; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 16px; border-radius: 12px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        #startBtn { background: var(--accent); color: white; }
        #addBtn { background: #28a745; color: white; display: none; margin-top: 10px; }
        
        /* Results List */
        .conf-list { text-align: left; background: #2a2a2a; padding: 15px; border-radius: 12px; margin-top: 20px; font-family: monospace; font-size: 14px; }
        .bar-bg { background: #444; height: 8px; border-radius: 4px; margin: 4px 0 12px 0; }
        .bar-fill { background: var(--accent); height: 100%; width: 0%; transition: width 0.2s linear; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-top:0">🛒 Smart Cart AI</h2>
    <input type="text" id="espIp" placeholder="Enter ESP32 IP (e.g. 192.168.1.50)">
    <button id="startBtn">INITIALIZE SYSTEM</button>

    <div id="video-wrap" style="display:none;">
        <video id="webcam" autoplay muted playsinline></video>
        <div id="ai-guide"></div>
        <div id="heartbeat"></div>
    </div>

    <div id="top-result" class="inference-display">READY</div>
    <button id="addBtn">➕ ADD TO CART</button>

    <div id="conf-list" class="conf-list">AI Statistics...</div>
</div>

<canvas id="hiddenCanvas" width="160" height="160" style="display:none;"></canvas>

<script>
    let classifier;
    let currentItem = null;
    const targets = ["Clay stick", "Sun stick", "Lighter", "Grips"];

    const startBtn = document.getElementById('startBtn');
    const videoWrap = document.getElementById('video-wrap');
    const topDisplay = document.getElementById('top-result');
    const heartbeat = document.getElementById('heartbeat');
    const addBtn = document.getElementById('addBtn');

    startBtn.onclick = async () => {
        startBtn.innerText = "LOADING WASM...";
        await initAI();
    };

    async function initAI() {
        try {
            // 1. Initialize Classifier
            classifier = new EdgeImpulseClassifier();
            await classifier.init();
            
            // 2. Start Camera
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            document.getElementById('webcam').srcObject = stream;
            
            // 3. UI Transition
            startBtn.style.display = 'none';
            videoWrap.style.display = 'block';
            topDisplay.innerText = "SCANNING...";
            
            inferenceLoop();
        } catch (e) {
            topDisplay.innerText = "ENGINE ERROR";
            alert("Error: " + e.message);
        }
    }

    async function inferenceLoop() {
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('hiddenCanvas');
        // willReadFrequently optimizes the canvas for the AI math engine
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        if (video.readyState === 4) {
            heartbeat.classList.toggle('pulse-on');

            // Crop to center 160x160 square
            ctx.drawImage(video, 0, 0, 160, 160);
            const imgData = ctx.getImageData(0, 0, 160, 160).data;
            
            // Convert pixels to Float32 for the AI
            const pixels = new Float32Array(160 * 160 * 3);
            for (let i = 0; i < 160 * 160; i++) {
                pixels[i * 3]     = imgData[i * 4]     / 255.0;
                pixels[i * 3 + 1] = imgData[i * 4 + 1] / 255.0;
                pixels[i * 3 + 2] = imgData[i * 4 + 2] / 255.0;
            }

            try {
                const result = await classifier.classify(Array.from(pixels));
                if (result && result.results) {
                    updateUI(result.results);
                }
            } catch (err) {
                console.error("Inference Error:", err);
            }
        }
        
        // 150ms delay keeps the UI responsive on mobile devices
        setTimeout(inferenceLoop, 150);
    }

    function updateUI(results) {
        // Sort results by highest confidence
        const sorted = results.sort((a, b) => b.value - a.value);
        const best = sorted[0];

        // Only display if confidence is above 35%
        if (best.value > 0.35) {
            topDisplay.innerText = `${best.label} ${(best.value * 100).toFixed(0)}%`;
            currentItem = best.label;
            
            if (targets.includes(best.label)) {
                addBtn.style.display = 'block';
                addBtn.innerText = `➕ ADD ${best.label.toUpperCase()}`;
            } else {
                addBtn.style.display = 'none';
            }
        } else {
            topDisplay.innerText = "SCANNING...";
            addBtn.style.display = 'none';
        }

        // Build the confidence bar list
        let html = "";
        sorted.forEach(r => {
            const p = (r.value * 100).toFixed(0);
            html += `<div>${r.label}: ${p}%</div>
                    <div class="bar-bg">
                        <div class="bar-fill" style="width: ${p}%"></div>
                    </div>`;
        });
        document.getElementById('conf-list').innerHTML = html;
    }

    // Communication with ESP32
    addBtn.onclick = () => {
        const ip = document.getElementById('espIp').value;
        if (!ip) return alert("Please enter your ESP32 IP address.");
        
        // no-cors mode allows the request to reach the ESP32 from GitHub Pages
        fetch(`http://${ip}/add?label=${encodeURIComponent(currentItem)}`, { mode: 'no-cors' })
        .then(() => alert(`${currentItem} added to cart!`))
        .catch(() => alert("Failed to connect to ESP32. Check WiFi and IP."));
    };
</script>
</body>
</html>
